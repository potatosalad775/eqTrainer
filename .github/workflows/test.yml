name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — headless, no device required, fastest feedback
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/ --reporter=github

