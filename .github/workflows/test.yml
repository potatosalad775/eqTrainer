  # ---------------------------------------------------------------------------
  # Integration tests (Windows desktop)
  # ---------------------------------------------------------------------------
  integration-windows:
    name: Integration Tests (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests (Windows desktop)
        run: flutter test integration_test/ --device-id windows --reporter=github

  # ---------------------------------------------------------------------------
  # Integration tests (macOS desktop)
  # ---------------------------------------------------------------------------
  integration-macos:
    name: Integration Tests (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods (required for coast_audio on macOS)
        run: cd macos && pod install

      - name: Run integration tests (macOS desktop)
        run: flutter test integration_test/ --device-id macos --reporter=github
